<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beyond the Scoreline TV — Links</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 48px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
    }
    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      overflow: hidden;
      margin-bottom: 18px;
      outline: 3px solid rgba(26,107,48,0.4);
      outline-offset: 4px;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    h1 { color: white; font-size: 24px; font-weight: 700; letter-spacing: -0.3px; text-align: center; margin-bottom: 8px; }
    .tagline { color: #888; font-size: 15px; text-align: center; margin-bottom: 40px; max-width: 320px; line-height: 1.55; }
    .links { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 12px; }
    .btn {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 20px; border-radius: 14px;
      text-decoration: none; color: white;
      font-size: 15px; font-weight: 600;
      border: 1.5px solid var(--accent);
      background: var(--bg);
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .btn:hover { transform: translateY(-2px); filter: brightness(1.15); }
    .btn:active { transform: translateY(0); }
    .icon-box {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--icon-bg, var(--accent));
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .btn span { flex: 1; }
    .chevron { color: #555; margin-left: auto; flex-shrink: 0; }
    .youtube   { --accent: #FF0000; --bg: #180b0b; }
    .instagram { --accent: #E1306C; --bg: #180b10; }
    .twitter   { --accent: #e7e7e7; --bg: #111; }
    .tiktok    { --accent: #69C9D0; --bg: #0a1415; }
    .twitter .icon-box  { background: #0a0a0a; border: 1px solid #333; }
    .tiktok  .icon-box  { background: #010101; border: 1px solid #69C9D0; }
    .instagram .icon-box { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    footer { color: #333; font-size: 12px; margin-top: 48px; text-align: center; }
  </style>
</head>
